name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax check
        run: python -m py_compile scripts/alphaxiv_lookup.py

      - name: CLI help check
        run: |
          python scripts/alphaxiv_lookup.py --help > help.txt
          grep -- '--input-file' help.txt

      - name: Offline normalization smoke test
        run: |
          python - <<'PY'
          import importlib.util
          import os
          spec = importlib.util.spec_from_file_location('alphaxiv_lookup', 'scripts/alphaxiv_lookup.py')
          mod = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(mod)
          assert mod.normalize_input('2603.07612')['paper_id'] == '2603.07612'
          assert mod.normalize_input('https://arxiv.org/abs/2603.07612')['paper_id'] == '2603.07612'
          assert mod.normalize_input('https://www.alphaxiv.org/overview/2603.07612')['paper_id'] == '2603.07612'
          cleaned = mod.clean_alpha_description('View recent discussion. Abstract: hello world')
          assert cleaned == 'hello world'
          compact = mod.compact_payload({
              'paper_id': 'x', 'title': 't', 'authors': 'a', 'status': 'ok',
              'source_used': 'arxiv', 'summary_source': 'arxiv_abstract', 'best_summary': 's',
              'alphaxiv_status': 'thin', 'arxiv_status': 'available',
              'resolved_alphaxiv_url': 'u1', 'resolved_arxiv_url': 'u2',
              'warnings': ['w'], 'errors': []
          })
          assert compact['summary_source'] == 'arxiv_abstract'
          brief = mod.as_brief({
              'paper_id': 'x',
              'title': 'Test Paper',
              'status': 'ok',
              'source_used': 'alphaxiv+arxiv',
              'summary_source': 'alphaxiv_report',
              'best_summary': 'This paper introduces a retrieval-augmented planner for long-horizon tasks. It addresses brittle multi-step planning in dynamic environments. The method combines a planner, a verifier, and a memory cache. It uses iterative self-correction with retrieved demonstrations.',
              'alphaxiv_status': 'available',
              'arxiv_status': 'available',
              'resolved_alphaxiv_url': 'u1',
              'resolved_arxiv_url': 'u2',
              'alphaxiv_report': 'This paper introduces a retrieval-augmented planner for long-horizon tasks. It addresses brittle multi-step planning in dynamic environments. The method combines a planner, a verifier, and a memory cache. It uses iterative self-correction with retrieved demonstrations.',
              'alphaxiv_description': '',
              'arxiv_abstract': 'This paper introduces a retrieval-augmented planner for long-horizon tasks.',
              'warnings': [],
              'errors': [],
          })
          assert 'Paper: Test Paper (x)' in brief
          assert 'Problem solved:' in brief
          assert 'Core method:' in brief
          assert 'Source: alphaXiv report. Confidence: higher.' in brief
          brief_zh = mod.as_brief_zh({
              'paper_id': 'z',
              'title': '测试论文',
              'status': 'ok',
              'source_used': 'arxiv',
              'summary_source': 'arxiv_abstract',
              'best_summary': 'We study efficient adaptation for vision models. The problem is updating large models under tight compute budgets. Our method trains a low-rank adapter and freezes the backbone.',
              'alphaxiv_status': 'thin',
              'arxiv_status': 'available',
              'resolved_alphaxiv_url': 'u1',
              'resolved_arxiv_url': 'u2',
              'alphaxiv_report': '',
              'alphaxiv_description': '',
              'arxiv_abstract': 'We study efficient adaptation for vision models. The problem is updating large models under tight compute budgets. Our method trains a low-rank adapter and freezes the backbone.',
              'warnings': [],
              'errors': [],
          })
          assert '论文：测试论文（z）' in brief_zh
          assert '一句话结论：' in brief_zh
          assert '解决什么问题：' in brief_zh
          assert '值不值得读：' in brief_zh
          assert '来源：arXiv 摘要 fallback。可信度：基础（alphaXiv: thin）。' in brief_zh
          brief_fallback = mod.as_brief({
              'paper_id': 'y',
              'title': 'Fallback Paper',
              'status': 'ok',
              'source_used': 'arxiv',
              'summary_source': 'arxiv_abstract',
              'best_summary': 'We study efficient adaptation for vision models. The problem is updating large models under tight compute budgets. Our method trains a low-rank adapter and freezes the backbone.',
              'alphaxiv_status': 'thin',
              'arxiv_status': 'available',
              'resolved_alphaxiv_url': 'u1',
              'resolved_arxiv_url': 'u2',
              'alphaxiv_report': '',
              'alphaxiv_description': 'Short overview only.',
              'arxiv_abstract': 'We study efficient adaptation for vision models. The problem is updating large models under tight compute budgets. Our method trains a low-rank adapter and freezes the backbone.',
              'warnings': ['AlphaXiv page fetched, but only a short overview was available.'],
              'errors': [],
          })
          assert 'Source: arXiv abstract fallback. Confidence: basic (alphaXiv: thin).' in brief_fallback
          assert 'Worth reading? Abstract-first; alphaXiv was thin, so this brief relies on arXiv.' in brief_fallback
          batch = [
              {
                  'paper_id': 'a', 'title': 'Paper A', 'authors': 'X', 'status': 'ok',
                  'source_used': 'arxiv', 'summary_source': 'arxiv_abstract', 'best_summary': 'First summary.',
                  'alphaxiv_status': 'thin', 'arxiv_status': 'available', 'resolved_alphaxiv_url': 'u1', 'resolved_arxiv_url': 'u2',
                  'warnings': [], 'errors': []
              },
              {
                  'paper_id': 'b', 'title': 'Paper B', 'authors': 'Y', 'status': 'ok',
                  'source_used': 'alphaxiv', 'summary_source': 'alphaxiv_report', 'best_summary': 'Second summary.',
                  'alphaxiv_status': 'available', 'arxiv_status': 'available', 'resolved_alphaxiv_url': 'u3', 'resolved_arxiv_url': 'u4',
                  'warnings': [], 'errors': []
              },
          ]
          batch_json = mod.render_many(batch, 'json')
          assert '"count": 2' in batch_json
          batch_jsonl = mod.render_many(batch, 'json-compact').strip().splitlines()
          assert len(batch_jsonl) == 2
          batch_brief_zh = mod.render_many(batch, 'brief-zh')
          assert '[1/2] Paper A' in batch_brief_zh
          assert '[2/2] Paper B' in batch_brief_zh
          input_path = 'ci-inputs.txt'
          with open(input_path, 'w', encoding='utf-8') as handle:
              handle.write('\n# comment line\n2603.07612\n\nhttps://arxiv.org/abs/2401.12345\n')
          assert mod.read_input_file(input_path) == ['2603.07612', 'https://arxiv.org/abs/2401.12345']
          assert mod.expand_cli_inputs(['2603.07612', '--input-file', input_path, '--format', 'json-compact', 'https://www.alphaxiv.org/overview/2501.01234']) == [
              '2603.07612',
              '2603.07612',
              'https://arxiv.org/abs/2401.12345',
              'https://www.alphaxiv.org/overview/2501.01234',
          ]
          os.remove(input_path)
          print('offline normalization smoke test ok')
          PY
